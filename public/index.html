<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProShare</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;padding:16px}
        .container{max-width:450px;margin:0 auto}
        .header{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:#fff;padding:18px;border-radius:14px;text-align:center;margin-bottom:14px}
        .header h1{font-size:22px}
        .header small{font-size:12px;opacity:.6}
        .header .status-row{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:6px;font-size:13px}
        .status-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
        .status-dot.online{background:#10b981}
        .status-dot.offline{background:#ef4444}
        .status-dot.connecting{background:#f59e0b;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
        .card{background:#fff;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
        .card h2{font-size:15px;font-weight:600;color:#1a1a2e;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
        .badge{background:#667eea;color:#fff;font-size:10px;padding:2px 10px;border-radius:12px;font-weight:400}
        .name-box{background:linear-gradient(135deg,#1a1a2e,#2d1b69);color:#fff;padding:14px;border-radius:10px;text-align:center}
        .name-box .label{font-size:10px;opacity:.5;text-transform:uppercase;letter-spacing:1px}
        .name-box .name{font-size:20px;font-weight:700;font-family:monospace;margin-top:2px}
        .name-box .ip{font-size:11px;opacity:.5;margin-top:2px;font-family:monospace}
        .custom-input{display:flex;align-items:center;gap:8px;background:#f8f9fa;border:1px solid #ddd;border-radius:8px;padding:6px 12px;margin-bottom:6px}
        .custom-input input{flex:1;border:none;background:transparent;padding:6px 0;font-size:13px;outline:none}
        .custom-input button{padding:4px 12px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:#667eea;color:#fff}
        .custom-input button:hover{background:#5a6fd6}
        .connect-row{display:flex;gap:6px}
        .connect-row input{flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-size:13px;background:#fafafa}
        .connect-row input:focus{outline:none;border-color:#667eea}
        .connect-row button{padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;background:#667eea;color:#fff}
        .connect-row button:hover{background:#5a6fd6}
        .btn-danger{background:#ef4444;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;cursor:pointer;width:100%;margin-top:6px}
        .btn-danger:hover{background:#dc2626}
        .password-toggle{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;font-size:13px;color:#4b5563}
        .password-toggle input[type="checkbox"]{width:16px;height:16px;accent-color:#667eea;cursor:pointer}
        .password-input{display:none;margin-top:4px}
        .password-input.active{display:block}
        .peer-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px}
        .peer-item{background:#e5e7eb;padding:3px 10px;border-radius:12px;font-size:12px;display:flex;align-items:center;gap:4px}
        .upload-area{border:2px dashed #ddd;border-radius:8px;padding:20px;text-align:center;cursor:pointer;font-size:13px;color:#6b7280;transition:.3s}
        .upload-area:hover{border-color:#667eea;background:#f8f9ff}
        .upload-area.dragover{border-color:#667eea;background:#f0f2ff}
        #fileInput{display:none}
        .file-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#f8f9fa;border-radius:6px;margin-bottom:4px;font-size:13px}
        .file-item .info{flex:1}
        .file-item .info .name{font-weight:500}
        .file-item .info .size{font-size:11px;color:#6b7280;margin-left:4px}
        .file-item .info .from{font-size:10px;color:#667eea;margin-left:4px}
        .file-item button{padding:3px 10px;border:none;border-radius:4px;background:#10b981;color:#fff;cursor:pointer;font-size:11px}
        .file-item button:hover{background:#059669}
        .empty-state{text-align:center;padding:20px;color:#9ca3af}
        .empty-state .icon{font-size:28px}
        .status-msg{padding:8px 12px;border-radius:8px;margin-top:8px;display:none;font-size:13px}
        .status-msg.show{display:block}
        .status-msg.success{background:#d1fae5;color:#065f46}
        .status-msg.error{background:#fee2e2;color:#991b1b}
        .status-msg.info{background:#dbeafe;color:#1e40af}
        .tabs{display:flex;gap:4px;background:#f0f2f5;padding:4px;border-radius:10px;margin-bottom:12px}
        .tab{flex:1;padding:6px 12px;border:none;background:transparent;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;color:#6b7280}
        .tab.active{background:#fff;color:#1a1a2e;box-shadow:0 1px 4px rgba(0,0,0,.08)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .file-badge{background:#667eea;color:#fff;padding:0 8px;border-radius:10px;font-size:10px;margin-left:4px}
        @media(max-width:480px){.connect-row{flex-direction:column}.connect-row button{width:100%}}
    </style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>📡 ProShare</h1>
        <div class="status-row">
            <span class="status-dot offline" id="statusDot"></span>
            <span id="statusText">Bağlanıyor...</span>
        </div>
    </div>

    <!-- BENİM ADIM -->
    <div class="card">
        <h2>👤 Benim Adım</h2>
        <div class="name-box">
            <div class="label">CİHAZ ADI</div>
            <div class="name" id="myName">-</div>
            <div class="ip" id="myIP">🌐 IP alınıyor...</div>
        </div>

        <div class="custom-input">
            <input type="text" id="nameInput" placeholder="Yeni cihaz adı">
            <button onclick="updateName()">Değiştir</button>
        </div>

        <div style="margin-top:8px;padding-top:8px;border-top:1px solid #eee;">
            <div class="password-toggle" onclick="document.getElementById('passwordToggle').click()">
                <input type="checkbox" id="passwordToggle">
                <span>🔒 Bağlantı şifresi <small style="color:#999;font-size:11px;">(isteğe bağlı)</small></span>
            </div>
            <div class="password-input" id="passwordInputArea">
                <div class="custom-input">
                    <input type="text" id="passwordInput" placeholder="Şifre belirleyin">
                </div>
                <div style="font-size:10px;color:#999;">Alıcı bu şifreyi girmeden bağlanamaz</div>
            </div>
        </div>

        <div style="margin-top:8px;">
            <span style="font-size:12px;color:#6b7280;">Ağdakiler:</span>
            <span class="badge" id="peerCount">0</span>
        </div>
        <div class="peer-list" id="peerList">
            <span style="color:#9ca3af;font-size:13px;">Henüz cihaz yok</span>
        </div>
    </div>

    <!-- BAĞLAN -->
    <div class="card">
        <h2>🔗 Bağlan</h2>
        <div class="connect-row">
            <input type="text" id="targetName" placeholder="Cihaz adı">
            <button onclick="connectToPeer()">Bağlan</button>
        </div>
        <div class="custom-input" style="margin-top:4px;">
            <input type="password" id="connectPassword" placeholder="Şifre (gerekirse)">
        </div>
        <button class="btn-danger" onclick="disconnectAll()">⛔ Tümünü Kes</button>
        <div id="connectStatus" class="status-msg"></div>
    </div>

    <!-- TABS -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('upload')">📤 Gönder</button>
        <button class="tab" onclick="switchTab('download')">📥 Gelenler <span class="file-badge" id="fileBadge">0</span></button>
    </div>

    <!-- GÖNDER -->
    <div id="uploadTab" class="tab-content active">
        <div class="card">
            <h2>📤 Dosya Gönder</h2>
            <div class="upload-area" id="uploadArea">
                <div style="font-size:32px;">📁</div>
                <div>Tıkla veya <strong>sürükle</strong></div>
            </div>
            <input type="file" id="fileInput" multiple>
            <div id="uploadStatus" class="status-msg"></div>
        </div>
    </div>

    <!-- GELENLER -->
    <div id="downloadTab" class="tab-content">
        <div class="card">
            <h2>📥 Gelen Dosyalar <span class="badge" id="fileCount">0</span></h2>
            <div id="fileList">
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <h4>Henüz dosya yok</h4>
                </div>
            </div>
        </div>
    </div>

</div>

<script>
    // ============================================================
    //  PROSHARE - KENDİ SUNUCU + ŞİFRE (SADE)
    // ============================================================

    const WS_URL = 'wss://' + window.location.host + '/api/socket';
    let ws = null;
    let myName = '';
    let myIP = '';
    let myPassword = '';
    let receivedFiles = [];
    let peerConnections = {};
    let dataChannels = {};

    // DOM
    const statusDot = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');
    const myNameEl = document.getElementById('myName');
    const myIPEl = document.getElementById('myIP');
    const nameInput = document.getElementById('nameInput');
    const passwordToggle = document.getElementById('passwordToggle');
    const passwordInputArea = document.getElementById('passwordInputArea');
    const passwordInput = document.getElementById('passwordInput');
    const targetName = document.getElementById('targetName');
    const connectPassword = document.getElementById('connectPassword');
    const connectBtn = document.querySelector('.connect-row button');
    const connectStatus = document.getElementById('connectStatus');
    const peerList = document.getElementById('peerList');
    const peerCount = document.getElementById('peerCount');
    const fileList = document.getElementById('fileList');
    const fileCount = document.getElementById('fileCount');
    const fileBadge = document.getElementById('fileBadge');
    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');

    // ============================================================
    //  WEBSOCKET
    // ============================================================

    function connectToSignalServer() {
        setStatus('connecting', '🔄 Bağlanıyor...');

        try {
            ws = new WebSocket(WS_URL);
            ws.binaryType = 'arraybuffer';
        } catch (e) {
            setStatus('offline', '❌ WebSocket desteklenmiyor');
            return;
        }

        ws.onopen = () => {
            setStatus('online', '✅ Sunucuya bağlandı');
            myName = 'Cihaz-' + Math.floor(Math.random() * 1000);
            myNameEl.textContent = myName;
            ws.send(JSON.stringify({
                type: 'register',
                name: myName,
                password: myPassword || ''
            }));
        };

ws.onmessage = async (event) => {
    try {
        // Veriyi string'e çevir
        let rawData;
        if (event.data instanceof Blob) {
            rawData = await event.data.text();
        } else if (event.data instanceof ArrayBuffer) {
            rawData = new TextDecoder().decode(event.data);
        } else {
            rawData = event.data;
        }

        const data = JSON.parse(rawData);
        console.log('📨 Gelen:', data);

        if (data.type === 'your-ip') {
            myIP = data.ip;
            myIPEl.textContent = '🌐 ' + myIP;
        }

        if (data.type === 'peers') {
            const peers = data.peers || [];
            updatePeerList(peers);
            peerCount.textContent = peers.length;
        }

        if (data.type === 'offer') handleOffer(data);
        if (data.type === 'answer') handleAnswer(data);
        if (data.type === 'candidate') handleCandidate(data);
        if (data.type === 'auth_error') {
            showConnectStatus('❌ ' + data.message, 'error');
        }

    } catch (e) {
        console.warn('Mesaj hatası:', e);
        console.warn('Gelen veri:', event.data);
    }
};
        ws.onclose = () => {
            setStatus('offline', '❌ Bağlantı koptu, yeniden bağlanılıyor...');
            setTimeout(connectToSignalServer, 3000);
        };

        ws.onerror = () => {
            setStatus('offline', '❌ Bağlanılamadı, yeniden deneniyor...');
            setTimeout(connectToSignalServer, 5000);
        };
    }

    function setStatus(state, text) {
        statusDot.className = 'status-dot ' + state;
        statusText.textContent = text;
    }

    // ============================================================
    //  WEBRTC
    // ============================================================

    const configuration = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' },
            { urls: 'stun:stun3.l.google.com:19302' },
            { urls: 'stun:stun4.l.google.com:19302' },
            // TURN (Android için)
            { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
            { urls: 'turn:openrelay.metered.ca:5349', username: 'openrelayproject', credential: 'openrelayproject' }
        ],
        iceCandidatePoolSize: 10,
        iceTransportPolicy: 'all'
    };

    function createPeerConnection(targetName) {
        const pc = new RTCPeerConnection(configuration);

        pc.onicecandidate = (event) => {
            if (event.candidate) {
                ws.send(JSON.stringify({
                    type: 'candidate',
                    target: targetName,
                    candidate: event.candidate
                }));
            }
        };

        pc.ondatachannel = (event) => {
            const channel = event.channel;
            dataChannels[targetName] = channel;
            setupDataChannel(channel, targetName);
        };

        pc.onconnectionstatechange = () => {
            if (pc.connectionState === 'connected') {
                showConnectStatus('✅ Bağlantı kuruldu!', 'success');
            }
            if (pc.connectionState === 'failed') {
                showConnectStatus('❌ Bağlantı başarısız', 'error');
                delete peerConnections[targetName];
            }
        };

        return pc;
    }

    function setupDataChannel(channel, from) {
        channel.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'file') {
                    const file = {
                        id: Date.now(),
                        name: data.name,
                        size: data.size,
                        sizeFormatted: formatBytes(data.size),
                        data: data.data,
                        from: from
                    };
                    receivedFiles.push(file);
                    updateFileList();
                    showUploadStatus('📥 Dosya alındı: ' + file.name, 'success');
                }
            } catch (e) {
                console.warn('Veri hatası:', e);
            }
        };
    }

    // ===== BAĞLAN =====
    function connectToPeer() {
        const target = targetName.value.trim();
        if (!target) {
            showConnectStatus('❌ Cihaz adı gir', 'error');
            return;
        }
        if (target === myName) {
            showConnectStatus('❌ Kendine bağlanamazsın!', 'error');
            return;
        }

        const password = connectPassword.value.trim() || '';
        showConnectStatus('🔗 Bağlanıyor: ' + target, 'info');
        connectBtn.disabled = true;

        ws.send(JSON.stringify({
            type: 'auth_check',
            target: target,
            password: password
        }));

        const authHandler = (event) => {
            try {
                const data = JSON.parse(event.data);
                if (data.type === 'auth_result') {
                    if (data.status === 'ok') {
                        startWebRTC(target);
                    } else {
                        showConnectStatus('❌ Şifre yanlış!', 'error');
                        connectBtn.disabled = false;
                    }
                    ws.removeEventListener('message', authHandler);
                }
            } catch (e) {}
        };
        ws.addEventListener('message', authHandler);

        setTimeout(() => {
            ws.removeEventListener('message', authHandler);
            if (connectBtn.disabled) {
                showConnectStatus('⏰ Zaman aşımı', 'error');
                connectBtn.disabled = false;
            }
        }, 30000);
    }

    function startWebRTC(target) {
        const pc = createPeerConnection(target);
        const channel = pc.createDataChannel('fileTransfer');
        dataChannels[target] = channel;
        setupDataChannel(channel, target);

        pc.createOffer()
            .then(offer => pc.setLocalDescription(offer))
            .then(() => {
                ws.send(JSON.stringify({
                    type: 'offer',
                    target: target,
                    sdp: pc.localDescription
                }));
            })
            .catch((err) => {
                console.warn('Offer hatası:', err);
                showConnectStatus('❌ Bağlantı hatası', 'error');
            });

        peerConnections[target] = pc;
        connectBtn.disabled = false;
    }

    function handleOffer(data) {
        const pc = createPeerConnection(data.from);
        pc.setRemoteDescription(new RTCSessionDescription(data.sdp))
            .then(() => pc.createAnswer())
            .then(answer => pc.setLocalDescription(answer))
            .then(() => {
                ws.send(JSON.stringify({
                    type: 'answer',
                    target: data.from,
                    sdp: pc.localDescription
                }));
            })
            .catch(err => console.warn('Offer hatası:', err));
        peerConnections[data.from] = pc;
    }

    function handleAnswer(data) {
        const pc = peerConnections[data.from];
        if (pc) {
            pc.setRemoteDescription(new RTCSessionDescription(data.sdp))
                .catch(err => console.warn('Answer hatası:', err));
        }
    }

    function handleCandidate(data) {
        const pc = peerConnections[data.from];
        if (pc) {
            pc.addIceCandidate(new RTCIceCandidate(data.candidate))
                .catch(err => console.warn('Candidate hatası:', err));
        }
    }

    function disconnectAll() {
        for (const [name, pc] of Object.entries(peerConnections)) {
            try { pc.close(); } catch (e) {}
        }
        peerConnections = {};
        dataChannels = {};
        showConnectStatus('⛔ Tüm bağlantılar kesildi', 'info');
    }

    // ============================================================
    //  İSİM & ŞİFRE
    // ============================================================

    function togglePassword() {
        const checked = passwordToggle.checked;
        passwordInputArea.classList.toggle('active', checked);
        if (!checked) {
            passwordInput.value = '';
            myPassword = '';
        }
    }

    function updateName() {
    const newName = nameInput.value.trim();
    if (!newName) {
        showConnectStatus('❌ İsim gir', 'error');
        return;
    }
    if (newName === myName) {
        showConnectStatus('ℹ️ Bu zaten mevcut', 'info');
        return;
    }

    // Eski adı sunucudan sil (leave)
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'leave'
        }));
    }

    // Yeni adı kaydet
    myName = newName;
    myNameEl.textContent = myName;

    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({
            type: 'register',
            name: myName,
            password: myPassword || ''
        }));
    }

    showConnectStatus('✅ İsim güncellendi: ' + myName, 'success');
}

    // ============================================================
    //  DOSYA GÖNDER
    // ============================================================

    function sendFile(file) {
        const peers = Object.keys(dataChannels);
        if (peers.length === 0) {
            showUploadStatus('❌ Bağlı cihaz yok!', 'error');
            return false;
        }

        const reader = new FileReader();
        reader.onload = (e) => {
            const data = {
                type: 'file',
                name: file.name,
                size: file.size,
                data: e.target.result.split(',')[1]
            };

            let sent = 0;
            for (const [name, channel] of Object.entries(dataChannels)) {
                try {
                    if (channel.readyState === 'open') {
                        channel.send(JSON.stringify(data));
                        sent++;
                    }
                } catch (err) {
                    console.warn('Gönderme hatası:', err);
                }
            }

            if (sent > 0) {
                showUploadStatus('📤 Gönderildi: ' + file.name + ' (' + sent + ' cihaz)', 'success');
            } else {
                showUploadStatus('❌ Gönderilemedi', 'error');
            }
        };
        reader.readAsDataURL(file);
        return true;
    }

    // ============================================================
    //  UI
    // ============================================================

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => {
        uploadArea.classList.remove('dragover');
    });
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            for (const file of e.dataTransfer.files) {
                sendFile(file);
            }
        }
    });
    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length) {
            for (const file of e.target.files) {
                sendFile(file);
            }
        }
        fileInput.value = '';
    });

    function updatePeerList(peers) {
        const peersWithoutMe = peers.filter(p => p !== myName);
        if (peersWithoutMe.length === 0) {
            peerList.innerHTML = '<span style="color:#9ca3af;font-size:13px;">Henüz cihaz yok</span>';
            return;
        }
        peerList.innerHTML = peersWithoutMe.map(p =>
            `<span class="peer-item">✅ ${p}</span>`
        ).join('');
    }

    function updateFileList() {
        const count = receivedFiles.length;
        fileCount.textContent = count;
        fileBadge.textContent = count;

        if (count === 0) {
            fileList.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📭</div>
                    <h4>Henüz dosya yok</h4>
                </div>
            `;
            return;
        }

        fileList.innerHTML = receivedFiles.map(file =>
            `<div class="file-item">
                <div class="info">
                    <span class="name">${file.name}</span>
                    <span class="size">${file.sizeFormatted}</span>
                    <span class="from">📡 ${file.from || '?'}</span>
                </div>
                <button onclick="downloadFile('${file.id}')">📥</button>
            </div>`
        ).join('');
    }

    function downloadFile(id) {
        const file = receivedFiles.find(f => f.id == id);
        if (file) {
            const a = document.createElement('a');
            a.href = 'data:application/octet-stream;base64,' + file.data;
            a.download = file.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        if (tab === 'upload') {
            document.querySelector('.tab:first-child').classList.add('active');
            document.getElementById('uploadTab').classList.add('active');
        } else {
            document.querySelector('.tab:last-child').classList.add('active');
            document.getElementById('downloadTab').classList.add('active');
        }
    }

    function showConnectStatus(msg, type) {
        connectStatus.className = 'status-msg show ' + type;
        connectStatus.textContent = msg;
        setTimeout(() => { connectStatus.className = 'status-msg'; }, 4000);
    }

    function showUploadStatus(msg, type) {
        uploadStatus.className = 'status-msg show ' + type;
        uploadStatus.textContent = msg;
        setTimeout(() => { uploadStatus.className = 'status-msg'; }, 4000);
    }

    function formatBytes(bytes) {
        if (bytes === 0) return '0 B';
        const k = 1024;
        const sizes = ['B', 'KB', 'MB', 'GB'];
        const i = Math.floor(Math.log(bytes) / Math.log(k));
        return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
    }

    // ============================================================
    //  ŞİFRE TOGGLE
    // ============================================================

    document.getElementById('passwordToggle').addEventListener('change', function() {
        passwordInputArea.classList.toggle('active', this.checked);
        if (!this.checked) {
            passwordInput.value = '';
            myPassword = '';
        }
    });

    passwordInput.addEventListener('input', function() {
        myPassword = this.value.trim();
    });

    // ============================================================
    //  BAŞLAT
    // ============================================================

    connectToSignalServer();
</script>
